<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelAgent - Trợ lý Du lịch</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#0ea5e9;--primary-dark:#0284c7;--primary-light:#e0f2fe;
  --accent:#f97316;--accent-light:#fff7ed;
  --bg:#f0f9ff;--surface:#fff;--text:#0f172a;--text-muted:#64748b;
  --border:#e2e8f0;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,.06);
}
html{font-size:16px}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── Header ─────────────────────────────────────── */
.header{
  background:linear-gradient(135deg,#0ea5e9 0%,#6366f1 100%);
  color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 12px rgba(14,165,233,.3);position:relative;z-index:10;
}
.header-icon{
  width:44px;height:44px;background:rgba(255,255,255,.2);
  border-radius:12px;display:grid;place-items:center;font-size:22px;
  backdrop-filter:blur(4px);flex-shrink:0;
}
.header-text h1{font-size:1.15rem;font-weight:700;letter-spacing:-.3px}
.header-text p{font-size:.78rem;opacity:.85;margin-top:1px}
.header-status{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:.75rem;opacity:.9;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:#4ade80;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Chat Area ──────────────────────────────────── */
.chat-container{
  flex:1;overflow-y:auto;padding:20px 16px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.chat-container::-webkit-scrollbar{width:5px}
.chat-container::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}

/* Welcome */
.welcome{
  text-align:center;padding:32px 16px 8px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.welcome-icon{font-size:48px}
.welcome h2{font-size:1.2rem;color:var(--text)}
.welcome p{font-size:.88rem;color:var(--text-muted);max-width:400px;line-height:1.5}

/* Quick Actions */
.quick-actions{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  padding:4px 16px 12px;
}
.quick-btn{
  border:1.5px solid var(--border);background:var(--surface);
  border-radius:24px;padding:8px 16px;font-size:.82rem;
  color:var(--text);cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:6px;
}
.quick-btn:hover{
  border-color:var(--primary);color:var(--primary);
  background:var(--primary-light);transform:translateY(-1px);
  box-shadow:0 2px 8px rgba(14,165,233,.12);
}

/* Messages */
.msg{display:flex;gap:10px;max-width:82%;animation:fadeUp .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.avatar{
  width:34px;height:34px;border-radius:10px;display:grid;
  place-items:center;font-size:16px;flex-shrink:0;
}
.msg.user .avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.msg.bot .avatar{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff}

.bubble{
  padding:12px 16px;border-radius:var(--radius);font-size:.9rem;
  line-height:1.6;word-break:break-word;box-shadow:var(--shadow);
}
.msg.user .bubble{
  background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;
  border-bottom-right-radius:4px;
}
.msg.bot .bubble{
  background:var(--surface);color:var(--text);
  border-bottom-left-radius:4px;border:1px solid var(--border);
}

.bubble h1,.bubble h2,.bubble h3{margin:12px 0 6px;font-size:1rem}
.bubble h1:first-child,.bubble h2:first-child,.bubble h3:first-child{margin-top:0}
.bubble ul,.bubble ol{padding-left:20px;margin:6px 0}
.bubble li{margin:3px 0}
.bubble strong{font-weight:600}
.bubble code{
  background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;
  font-size:.82em;font-family:'Fira Code',monospace;
}
.bubble table{
  border-collapse:collapse;width:100%;margin:8px 0;font-size:.85rem;
}
.bubble th,.bubble td{
  border:1px solid var(--border);padding:6px 10px;text-align:left;
}
.bubble th{background:#f1f5f9;font-weight:600}
.bubble a{color:var(--primary);text-decoration:underline}

.timestamp{
  font-size:.68rem;color:var(--text-muted);margin-top:4px;
  text-align:right;padding:0 4px;
}
.msg.bot .timestamp{text-align:left}

/* Typing Indicator */
.typing{display:flex;align-items:center;gap:10px;padding:4px 0}
.typing .avatar{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;
  display:grid;place-items:center;font-size:16px;
}
.dots{display:flex;gap:4px;padding:10px 16px;background:var(--surface);
  border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.dots span{
  width:7px;height:7px;border-radius:50%;background:#94a3b8;
  animation:bounce .6s infinite alternate;
}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-6px);background:var(--primary)}}

/* ── Input Area ─────────────────────────────────── */
.input-area{
  padding:12px 16px 16px;background:var(--surface);
  border-top:1px solid var(--border);
}
.input-row{
  display:flex;gap:10px;max-width:780px;margin:0 auto;
}
.input-wrap{
  flex:1;display:flex;align-items:flex-end;
  border:2px solid var(--border);border-radius:14px;
  background:#f8fafc;transition:.2s;padding:4px;
}
.input-wrap:focus-within{
  border-color:var(--primary);background:#fff;
  box-shadow:0 0 0 3px rgba(14,165,233,.12);
}
#msgInput{
  flex:1;border:none;outline:none;background:transparent;
  padding:10px 12px;font-size:.92rem;font-family:inherit;
  resize:none;max-height:120px;line-height:1.5;
}
#msgInput::placeholder{color:#94a3b8}
.send-btn{
  width:46px;height:46px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;
  cursor:pointer;display:grid;place-items:center;transition:.2s;
  flex-shrink:0;
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(14,165,233,.35)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.send-btn svg{width:20px;height:20px}

.input-hint{
  text-align:center;font-size:.72rem;color:var(--text-muted);
  margin-top:6px;
}

/* ── New Session ────────────────────────────────── */
.new-session{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;border-radius:8px;padding:6px 12px;font-size:.78rem;
  cursor:pointer;transition:.2s;backdrop-filter:blur(4px);
}
.new-session:hover{background:rgba(255,255,255,.25)}

/* ── Responsive ─────────────────────────────────── */
@media(max-width:600px){
  .header{padding:12px 14px}
  .header-icon{width:38px;height:38px;font-size:18px}
  .msg{max-width:92%}
  .quick-actions{gap:6px}
  .quick-btn{font-size:.78rem;padding:7px 12px}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-icon">&#9992;</div>
  <div class="header-text">
    <h1>TravelAgent</h1>
    <p>Trợ lý tìm vé máy bay & khách sạn</p>
  </div>
  <div class="header-status">
    <span class="status-dot"></span> Online
  </div>
  <button class="new-session" onclick="newSession()" title="Cuộc hội thoại mới">+ Mới</button>
</header>

<!-- Chat -->
<div class="chat-container" id="chatBox">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">&#127758;</div>
    <h2>Xin chào! Bạn muốn đi đâu?</h2>
    <p>Tôi sẽ giúp bạn tìm vé máy bay và khách sạn phù hợp với ngân sách. Hãy cho tôi biết bạn cần gì!</p>
  </div>
  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" onclick="sendQuick(this)">&#9992; Tìm vé máy bay Hà Nội - Đà Nẵng</button>
    <button class="quick-btn" onclick="sendQuick(this)">&#127968; Khách sạn Đà Nẵng dưới 1 triệu</button>
    <button class="quick-btn" onclick="sendQuick(this)">&#127881; Combo du lịch Nha Trang 3 triệu</button>
    <button class="quick-btn" onclick="sendQuick(this)">&#128176; Tư vấn du lịch tiết kiệm</button>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="Nhập yêu cầu du lịch của bạn..." autofocus></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter để gửi &middot; Shift+Enter để xuống dòng</div>
</div>

<!-- Markdown parser (lightweight) -->
<script>
const md={
  parse(s){
    s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // tables
    s=s.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm,(_,hdr,_a,body)=>{
      const th=hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const rows=body.trim().split('\n').map(r=>{
        const tds=r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
    });
    s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
    s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
    // lists
    s=s.replace(/^(\d+)\. (.+)$/gm,'<oli>$2</oli>');
    s=s.replace(/((?:<oli>.+<\/oli>\n?)+)/g,m=>'<ol>'+m.replace(/<\/?oli>/g,t=>t==='<oli>'?'<li>':'</li>')+'</ol>');
    s=s.replace(/^[-*] (.+)$/gm,'<uli>$1</uli>');
    s=s.replace(/((?:<uli>.+<\/uli>\n?)+)/g,m=>'<ul>'+m.replace(/<\/?uli>/g,t=>t==='<uli>'?'<li>':'</li>')+'</ul>');
    // paragraphs
    s=s.replace(/\n{2,}/g,'</p><p>');
    s=s.replace(/\n/g,'<br>');
    return `<p>${s}</p>`.replace(/<p><\/p>/g,'').replace(/<p>(<h[123]>)/g,'$1').replace(/(<\/h[123]>)<\/p>/g,'$1').replace(/<p>(<[uo]l>)/g,'$1').replace(/(<\/[uo]l>)<\/p>/g,'$1').replace(/<p>(<table>)/g,'$1').replace(/(<\/table>)<\/p>/g,'$1');
  }
};
</script>

<script>
let sessionId = crypto.randomUUID();
const chatBox = document.getElementById('chatBox');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let isLoading = false;

function timeStr(){
  return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
}

function scrollBottom(){
  requestAnimationFrame(()=>chatBox.scrollTop=chatBox.scrollHeight);
}

function hideWelcome(){
  const w=document.getElementById('welcome');
  const q=document.getElementById('quickActions');
  if(w) w.style.display='none';
  if(q) q.style.display='none';
}

function addMessage(text,role){
  hideWelcome();
  const wrap=document.createElement('div');
  wrap.className=`msg ${role}`;

  const avatar=document.createElement('div');
  avatar.className='avatar';
  avatar.innerHTML = role==='user' ? '&#128100;' : '&#9992;';

  const col=document.createElement('div');

  const bubble=document.createElement('div');
  bubble.className='bubble';
  try {
    bubble.innerHTML = role==='bot' ? md.parse(text||'') : (text||'').replace(/\n/g,'<br>');
  } catch(err) {
    bubble.textContent = text || 'Không thể hiển thị nội dung.';
  }

  const ts=document.createElement('div');
  ts.className='timestamp';
  ts.textContent=timeStr();

  col.appendChild(bubble);
  col.appendChild(ts);
  wrap.appendChild(avatar);
  wrap.appendChild(col);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function showTyping(){
  hideWelcome();
  const el=document.createElement('div');
  el.className='typing';
  el.id='typing';
  el.innerHTML=`
    <div class="avatar">&#9992;</div>
    <div class="dots"><span></span><span></span><span></span></div>`;
  chatBox.appendChild(el);
  scrollBottom();
}

function removeTyping(){
  const el=document.getElementById('typing');
  if(el) el.remove();
}

function setLoading(v){
  isLoading=v;
  sendBtn.disabled=v;
  msgInput.disabled=v;
  if(!v) msgInput.focus();
}

async function sendMessage(){
  const text=msgInput.value.trim();
  if(!text||isLoading) return;
  msgInput.value='';
  autoResize();
  addMessage(text,'user');
  setLoading(true);
  showTyping();

  const controller = new AbortController();
  const timeoutId = setTimeout(()=>controller.abort(), 120000);

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:text,session_id:sessionId,user_id:'web_user'}),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if(!res.ok){
      let errMsg = `Server error (${res.status})`;
      try {
        const errData = await res.json();
        if(errData.error) errMsg = errData.error;
      } catch(_){}
      removeTyping();
      addMessage('Xin lỗi, đã xảy ra lỗi: ' + errMsg, 'bot');
      return;
    }

    const data = await res.json();
    removeTyping();

    if(data.error){
      addMessage('Xin lỗi, đã xảy ra lỗi: '+data.error,'bot');
    } else {
      addMessage(data.response || 'Agent không trả về kết quả.','bot');
    }
  }catch(e){
    clearTimeout(timeoutId);
    removeTyping();
    if(e.name === 'AbortError'){
      addMessage('Yêu cầu quá thời gian chờ. Vui lòng thử lại.','bot');
    } else {
      addMessage('Không thể kết nối đến server. Vui lòng kiểm tra server đang chạy và thử lại.','bot');
      console.error('Fetch error:', e);
    }
  } finally {
    setLoading(false);
  }
}

function sendQuick(btn){
  const raw = btn.textContent.trim();
  const text = raw.replace(/^[^\p{L}\p{N}]+/u, '').trim();
  msgInput.value = text;
  sendMessage();
}

function newSession(){
  sessionId=crypto.randomUUID();
  isLoading=false;
  sendBtn.disabled=false;
  msgInput.disabled=false;
  chatBox.innerHTML=`
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&#127758;</div>
      <h2>Xin chào! Bạn muốn đi đâu?</h2>
      <p>Tôi sẽ giúp bạn tìm vé máy bay và khách sạn phù hợp với ngân sách. Hãy cho tôi biết bạn cần gì!</p>
    </div>
    <div class="quick-actions" id="quickActions">
      <button class="quick-btn" onclick="sendQuick(this)">&#9992; Tìm vé máy bay Hà Nội - Đà Nẵng</button>
      <button class="quick-btn" onclick="sendQuick(this)">&#127968; Khách sạn Đà Nẵng dưới 1 triệu</button>
      <button class="quick-btn" onclick="sendQuick(this)">&#127881; Combo du lịch Nha Trang 3 triệu</button>
      <button class="quick-btn" onclick="sendQuick(this)">&#128176; Tư vấn du lịch tiết kiệm</button>
    </div>`;
  msgInput.value='';
  msgInput.focus();
}

function autoResize(){
  msgInput.style.height='auto';
  msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px';
}

msgInput.addEventListener('input',autoResize);
msgInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});
</script>
</body>
</html>
